blueprint:
  name: Sonos Music Follow – Dynamic Speaker Grouping based on Room Presence
  description: |
    🔊 **Automatically have your Sonos speakers follow you from room to room!**

    This automation dynamically manages Sonos speaker groups based on room presence sensors.

    - 🏠 When you enter a room, that room’s speaker joins the active music group.
    - 🚪 When you leave a room, its speaker unjoins after a delay.
    - 🔇 Leaving the master room mutes it instead of unjoining (to preserve queue).
    - 📺 Players currently playing TV audio will never be grouped, so you won’t accidentally merge your TV and music.
    - 💤 When all presence sensors show nobody home for a while, playback stops and the group resets.
    - 🔁 If all players have stopped playing for a while, the group resets automatically and the master unmutes.

    ---
    <details>
    <summary><b>🛠 How to use</b></summary>

    - Select your Sonos speakers and match them with one presence sensor each.
    - Use an `input_text` helper to store the master player.
    - Set values for the different options given and you're good to go!
    </details>

  domain: automation

  input:
    sonos_players:
      name: 🎶 Sonos Speakers
      description: >
        Select **all Sonos speakers** you want to include.
        Each speaker must have a matching presence sensor below.
      selector:
        entity:
          multiple: true
          filter:
            - integration: sonos
              domain: media_player

    presence_sensors:
      name: 🚪 Room Presence Sensors
      description: >
        Select one presence sensor per room, matching the order of your speakers above.
      selector:
        entity:
          filter:
            domain: 
              - binary_sensor
              - group
          multiple: true

    master_player_helper:
      name: 🗂️ Master Player Helper (`input_text`)
      description: >
        Select an `input_text` helper to store the current master speaker.
      selector:
        entity:
          domain: input_text

    use_toggle_helper:
      name: ✅ Enable Toggle Helper?
      description: >
        Use this if you want an `input_boolean` to enable/disable the automation.
      default: false
      selector:
        boolean:

    toggle_helper:
      name: 🕹️ Toggle Helper (`input_boolean`)
      description: >
        Select the toggle helper here if enabled above.
      default: ""
      selector:
        entity:
          domain: input_boolean

    presence_off_delay:
      name: ⏲️ Room Vacant Delay (seconds)
      description: >
        How long a room should stay empty before unjoining its speaker.
      default: 30
      selector:
        number:
          min: 0
          max: 600
          unit_of_measurement: seconds

    all_rooms_off_delay:
      name: 💤 Whole House Vacant Delay (seconds)
      description: >
        How long all sensors must be off before stopping playback.
      default: 60
      selector:
        number:
          min: 0
          max: 1800
          unit_of_measurement: seconds

    pause_reset_delay:
      name: ⏹️ Pause Reset Delay (seconds)
      description: >
        How long the master speaker must remain paused before resetting the group and clearing the master.
      default: 30
      selector:
        number:
          min: 5
          max: 600
          unit_of_measurement: seconds

    group_reset_delay:
      name: ⏲️ Group Reset Delay (seconds)
      description: >
        How long after all players stop should the group reset and master unmute.
      default: 120
      selector:
        number:
          min: 10
          max: 1800
          unit_of_measurement: seconds

    fade_in_enabled:
      name: 🎧 Enable Volume Fade-in?
      description: >
        Enable volume fade-in on new room join or master unmute.
      default: false
      selector:
        boolean:

    fade_in_duration:
      name: ⏳ Fade-in Duration (seconds)
      description: >
        How long the fade-in takes.
      default: 5
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: seconds

    fade_in_target:
      name: 🎚️Default Target Volume Level
      description: >
        Default volume level target for the fade-in.
      default: 0.12
      selector:
        number:
          min: 0
          max: 1
          step: 0.01

    fade_in_targets:
      name: 🎚️ Individual Fade-In Volume-Targets
      description: >
        JSON mapping of media_player entity IDs to comfortable listening volume levels.
        These values will be used for the fade-in functionality, effectively overwriting the default value above for each speaker specified.
        Example: `{"media_player.livingroom":0.25,"media_player.bedroom":0.15}` 
      default: '{}'
      selector:
        text:

mode: queued
max: 10

variables:
  sonos_players: !input sonos_players
  presence_sensors: !input presence_sensors
  master_player_helper: !input master_player_helper
  use_toggle: !input use_toggle_helper
  toggle_entity: !input toggle_helper
  mapping: >
    {% set sensors = presence_sensors %}
    {% set players = sonos_players %}
    {{ dict(zip(sensors, players)) }}
  fade_in_enabled: !input fade_in_enabled
  fade_in_targets: "{{ (fade_in_targets_raw | from_json) if fade_in_targets_raw else {} }}"
  fade_in_targets_raw: !input fade_in_targets
  fade_in_target: !input fade_in_target
  fade_in_duration: !input fade_in_duration

trigger:
  - platform: state
    entity_id: !input sonos_players
    to: 'playing'
    id: media_player_playing

  - platform: state
    entity_id: !input presence_sensors
    to: 'on'
    id: sensor_on

  - platform: state
    entity_id: !input presence_sensors
    to: 'off'
    for:
      seconds: !input presence_off_delay
    id: sensor_off_delayed

  - platform: state
    entity_id: !input presence_sensors
    to: 'off'
    for:
      seconds: !input all_rooms_off_delay
    id: all_rooms_off_delayed


  - platform: state
    entity_id: !input sonos_players
    to: 'paused'
    for:
      seconds: !input pause_reset_delay
    id: paused_delayed

condition:
  - condition: template
    value_template: "{{ not use_toggle or is_state(toggle_entity, 'on') }}"

action:
  - choose:
      # Set master if only one player is playing
      - conditions:
          - condition: trigger
            id: media_player_playing
          - condition: template
            value_template: >
              {{ expand(sonos_players) | selectattr('state', 'eq', 'playing') | list | length == 1 }}
        sequence:
          - service: input_text.set_value
            target:
              entity_id: "{{ master_player_helper }}"
            data:
              value: "{{ trigger.entity_id }}"

      # Master room occupied → unmute master + fade-in
      - conditions:
          - condition: trigger
            id: sensor_on
          - condition: template
            value_template: >
              {% set player = mapping[trigger.entity_id] %}
              {% set master = states(master_player_helper) %}
              {{ player == master }}
        sequence:
          - variables:
              master: "{{ states(master_player_helper) }}"
              fade_in_targets_raw: !input fade_in_targets
              fade_in_targets: "{{ (fade_in_targets_raw | from_json) if fade_in_targets_raw else {} }}"
              current_volume: "{{ state_attr(master, 'volume_level') | default(0) }}"
              target_vol: "{{ fade_in_targets.get(master, fade_in_target | float) }}"
              is_muted: "{{ state_attr(master, 'is_volume_muted') }}"
          - service: media_player.volume_mute
            target:
              entity_id: "{{ master }}"
            data:
              is_volume_muted: false
          - condition: template
            value_template: >
              {{ fade_in_enabled and (is_muted or current_volume < (target_vol * 0.9)) }}
          - service: media_player.volume_set
            target:
              entity_id: "{{ master }}"
            data:
              volume_level: 0
          - variables:
              fade_in_steps: "{{ fade_in_duration * 2 }}"
              step_vol: "{{ target_vol / fade_in_steps }}"
          - repeat:
              count: "{{ fade_in_steps | int }}"
              sequence:
                - service: media_player.volume_set
                  target:
                    entity_id: "{{ master }}"
                  data:
                    volume_level: "{{ repeat.index * step_vol }}"
                - delay: "00:00:00.5"

      # Non-master room occupied → join group + fade-in
      - conditions:
          - condition: trigger
            id: sensor_on
          - condition: template
            value_template: >
              {% set player = mapping[trigger.entity_id] %}
              {% set master = states(master_player_helper) %}
              {{ player != master and states(master) in ['playing','paused'] }}
        sequence:
          - variables:
              new_player: "{{ mapping[trigger.entity_id] }}"
              master: "{{ states(master_player_helper) }}"
              current_group: "{{ state_attr(master, 'group_members') or [master] }}"
          - if:
              - condition: template
                value_template: "{{ new_player not in current_group }}"
            then:
              - if:
                  - condition: template
                    value_template: "{{ fade_in_enabled }}"
                then:
                  - service: media_player.volume_set
                    target:
                      entity_id: "{{ new_player }}"
                    data:
                      volume_level: 0
                  - service: media_player.join
                    data:
                      entity_id: "{{ master }}"
                      group_members: ["{{ new_player }}"]
                  - wait_template: "{{ new_player in state_attr(master, 'group_members') }}"
                    timeout: 10
                    continue_on_timeout: true
                  - variables:
                      fade_in_steps: "{{ fade_in_duration * 2 }}"
                      fade_in_targets_raw: !input fade_in_targets
                      fade_in_targets: "{{ (fade_in_targets_raw | from_json) if fade_in_targets_raw else {} }}"
                      target_vol: "{{ fade_in_targets.get(new_player, fade_in_target | float) }}"
                      step_vol: "{{ target_vol / fade_in_steps }}"
                  - repeat:
                      count: "{{ fade_in_steps | int }}"
                      sequence:
                        - service: media_player.volume_set
                          target:
                            entity_id: "{{ new_player }}"
                          data:
                            volume_level: "{{ repeat.index * step_vol }}"
                        - delay: "00:00:00.5"
                else:
                  - service: media_player.join
                    data:
                      entity_id: "{{ master }}"
                      group_members: ["{{ new_player }}"]

      # When all rooms empty → stop master and clear
      - conditions:
          - condition: trigger
            id: all_rooms_off_delayed
          - condition: template
            value_template: >
              {{ expand(presence_sensors) | selectattr('state', 'eq', 'on') | list | length == 0 }}
        sequence:
          - service: media_player.media_stop
            target:
              entity_id: "{{ states(master_player_helper) }}"
          - service: input_text.set_value
            target:
              entity_id: "{{ master_player_helper }}"
            data:
              value: ""

      # Master room empty → mute master
      - conditions:
          - condition: trigger
            id: sensor_off_delayed
          - condition: template
            value_template: >
              {% set player = mapping[trigger.entity_id] %}
              {% set master = states(master_player_helper) %}
              {{ player == master }}
        sequence:
          - service: media_player.volume_mute
            target:
              entity_id: "{{ states(master_player_helper) }}"
            data:
              is_volume_muted: true

      # Non-master room empty → unjoin that player
      - conditions:
          - condition: trigger
            id: sensor_off_delayed
          - condition: template
            value_template: >
              {% set player = mapping[trigger.entity_id] %}
              {% set master = states(master_player_helper) %}
              {{ player != master and player in (state_attr(master, 'group_members') or []) }}
        sequence:
          - service: media_player.unjoin
            target:
              entity_id: "{{ mapping[trigger.entity_id] }}"


      # Master paused for too long → reset group
      - conditions:
          - condition: trigger
            id: paused_delayed
          - condition: template
            value_template: >
              {{ trigger.entity_id == states(master_player_helper) }}
        sequence:
          - service: media_player.unjoin
            target:
              entity_id: >
                {% set members = state_attr(trigger.entity_id, 'group_members') | default([]) %}
                {{ members | reject('equalto', trigger.entity_id) | list }}
          - service: media_player.volume_mute
            target:
              entity_id: !input sonos_players
            data:
              is_volume_muted: false
          - service: input_text.set_value
            target:
              entity_id: "{{ master_player_helper }}"
            data:
              value: ""

      # All players idle/off for group_reset_delay → reset group
      - conditions:
          - condition: trigger
            id: group_reset
        sequence:
          - service: media_player.unjoin
            target:
              entity_id: >
                {% set master = states(master_player_helper) %}
                {% set members = state_attr(master, 'group_members') | default([]) %}
                {{ members | reject('equalto', master) | list }}
          - service: media_player.volume_mute
            target:
              entity_id: !input sonos_players
            data:
              is_volume_muted: false
          - service: input_text.set_value
            target:
              entity_id: "{{ master_player_helper }}"
            data:
              value: ""
